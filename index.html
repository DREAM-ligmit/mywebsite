<!DOCTYPE html>
<<!DOCTYPE html>>
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DREAM | Matrix Portfolio</title>

<style>

body{
margin:0;
background:black;
color:#00ff9c;
font-family:Courier New, monospace;
overflow:hidden;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

.container{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
border:1px solid #00ff9c;
padding:40px;
border-radius:10px;
box-shadow:0 0 20px #00ff9c;
background:rgba(0,0,0,0.7);
width:90%;
max-width:600px;
}

h1{
font-size:40px;
}

#typing{
margin:15px 0;
font-size:20px;
}

.skills{
margin-top:20px;
}

.skill{
display:inline-block;
border:1px solid #00ff9c;
padding:8px 15px;
margin:5px;
transition:0.3s;
}

.skill:hover{
background:#00ff9c;
color:black;
}

.buttons{
margin-top:25px;
}

.buttons a{
text-decoration:none;
color:#00ff9c;
border:1px solid #00ff9c;
padding:10px 20px;
margin:5px;
display:inline-block;
transition:0.3s;
}

.buttons a:hover{
background:#00ff9c;
color:black;
box-shadow:0 0 15px #00ff9c;
}

footer{
margin-top:20px;
opacity:0.7;
}

</style>

</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">

<h1>DREAM</h1>

<div id="typing"></div>

<p>
> Student from Nepal  <br>
> DREAMMING TO BECAME Software Engineer 💻 <br>
> Learning Coding right now it doesn't took too much time to create it
</p>

<div class="skills">

<div class="skill">HTML</div>
<div class="skill">CSS</div>
<div class="skill">JavaScript</div>
<div class="skill">Web Dev</div>

</div>

<div class="buttons">

<a href="#">Instagram</a>
<a href="#">GitHub</a>
<a href="#">Contact</a>

</div>

<footer>
SYSTEM STATUS: CONNECTED
</footer>

</div>

<script>

const text="INITIALIZING DREAM PORTFOLIO...";
let i=0;

function typing(){
if(i<text.length){
document.getElementById("typing").innerHTML+=text.charAt(i);
i++;
setTimeout(typing,70);
}
}

typing();

const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");

canvas.height=window.innerHeight;
canvas.width=window.innerWidth;

const letters="01";
const fontSize=16;
const columns=canvas.width/fontSize;

const drops=[];

for(let x=0;x<columns;x++)
drops[x]=1;

function draw(){
ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#00ff9c";
ctx.font=fontSize+"px monospace";

for(let i=0;i<drops.length;i++){

const text=letters.charAt(Math.floor(Math.random()*letters.length));

ctx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize>canvas.height && Math.random()>0.975)
drops[i]=0;

drops[i]++;

}

}

setInterval(draw,35);

</script>

</body>
</html>
