<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DREAM | Personal Page</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(120deg,#4facfe,#00f2fe);
color:#333;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:white;
padding:40px;
border-radius:15px;
text-align:center;
width:90%;
max-width:500px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.pfp{
width:120px;
height:120px;
border-radius:50%;
background:#00ff88;
padding:10px;
}

h1{
margin:10px 0;
}

.about{
color:#555;
margin-top:10px;
}

.motivation{
margin-top:20px;
font-style:italic;
color:#0077ff;
}

.skills{
margin-top:20px;
}

.skill{
display:inline-block;
background:#f0f0f0;
padding:8px 15px;
margin:5px;
border-radius:20px;
}

.buttons{
margin-top:25px;
}

.buttons a{
text-decoration:none;
color:white;
background:#0077ff;
padding:10px 20px;
margin:5px;
border-radius:25px;
display:inline-block;
transition:0.3s;
}

.buttons a:hover{
background:#0056c7;
}

footer{
margin-top:20px;
font-size:14px;
color:#777;
}

</style>

</head>

<body>

<div class="card">

<img class="pfp" src="https://upload.wikimedia.org/wikipedia/en/9/9a/Dream_logo.svg">

<h1>DREAM</h1>

<p class="about">
Hi! I'm DREAM, a student from Nepal.  
I'm learning coding and web development step by step.  
My dream is to become a software engineer in the future.
</p>

<p class="motivation">
"Start small. Stay consistent. Build something amazing."
</p>

<div class="skills">
<span class="skill">Learning Coding</span>
<span class="skill">Web Development</span>
<span class="skill">Problem Solving</span>
</div>

<div class="buttons">
<a href="#">Instagram</a>
<a href="#">GitHub</a>
</div>

<footer>
Built by DREAM 🚀
</footer>

</div>

</body>
</html>
